<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Росточек</title>

  <!-- Подключаем стили -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ====== Шапка ====== -->
  <header class="header">
    <h1>Росточек 🌱</h1>
    <button class="add-btn">+</button>
  </header>

  <!-- ====== Поиск ====== -->
  <div class="search-container">
    <input type="text" placeholder="Поиск растений...">
  </div>

  <!-- ====== Контент ====== -->
  <main class="main">

    <!-- Пустой экран -->
    <div class="empty-state">
      <p class="empty-title">Пока тут ничего не растёт</p>
      <p class="empty-subtitle">Давай это исправим? 🌿</p>

      <button class="add-first-btn">Добавить растение</button>
    </div>

  </main>

  <!-- Подключаем JS -->
  <script src="script.js"></script>

</body>
</html>
